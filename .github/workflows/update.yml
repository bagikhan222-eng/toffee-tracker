name: Toffee Tracker Auto Update

on:
  schedule:
    - cron: '0 */3 * * *'     # Runs automatically every 3 hours
  workflow_dispatch:          # Creates manual "Run workflow" trigger option button

permissions:
  contents: write

jobs:
  build_and_extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4.2.2  # Uses the exact patch release updated for Node runtimes

      - name: Set up Python Environment
        uses: actions/setup-python@v5.4.0  # Upgraded to clear deprecation logs
        with:
          python-version: '3.10'

      - name: Install Network Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Extraction Engine
        run: python extract_toffee.py

      - name: Commit and Push Generated Playlists
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force Git to track and stage all three modified outputs cleanly
          git add toffee_data.json Ns_player.m3u OTT_Navigator.m3u
          
          # Commit exclusively if data tracking structural modifications actually exist
          git diff-index --quiet HEAD || git commit -m "Update live streaming playlists [skip ci]"
          
          git push origin HEAD
