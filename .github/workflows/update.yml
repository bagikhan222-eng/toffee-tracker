name: Auto Update Toffee Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Install the missing yt-dlp binary system dependency 
    - name: Install System Dependencies
      run: |
        sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yt-dlp

    - name: Run Extraction Script
      env:
        TOFFEE_COOKIE: ${{ secrets.TOFFEE_COOKIE }}
        TOFFEE_AUTH_TOKEN: ${{ secrets.TOFFEE_AUTH_TOKEN }}
      run: python extract_toffee.py

    - name: Commit and Push changes
  run: |
    git config --global user.name "github-actions[bot]"
    git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
    
    # 1. Add the newly generated JSON file
    git add toffee_data.json
    
    # 2. Only commit if there are actual updates to the file
    git diff-index --quiet HEAD || git commit -m "Update Toffee live stream token [skip ci]"
    
    # 3. Pull down remote changes first to prevent the 'rejected' error
    git pull --rebase origin main
    
    # 4. Push safely back to the repository
    git push origin main
